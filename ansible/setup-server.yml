---
- name: Initialize Todo App Server
  hosts: all
  become: yes
  vars:
    app_dir: "/var/www/todo-app"
    repo_url: "https://github.com/natkass/webstack-portfolio-project-todo-app.git"
    node_version: "18"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Install required system packages
      apt:
        name:
          - curl
          - git
          - build-essential
        state: present

    - name: Add Node.js apt key
      shell: "curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg"
      args:
        creates: /etc/apt/keyrings/nodesource.gpg

    - name: Add Node.js repository
      shell: "echo \"deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main\" | tee /etc/apt/sources.list.d/nodesource.list"
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        update_cache: yes

    - name: Install PM2 globally
      npm:
        name: pm2
        global: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Clone the repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        force: yes
      become: no

    - name: Install backend dependencies
      npm:
        path: "{{ app_dir }}/backend"
      become: no

    - name: Install frontend dependencies
      npm:
        path: "{{ app_dir }}/frontend"
      become: no

    - name: Start the app with PM2 (Backend)
      shell: "pm2 start dist/index.js --name todo-backend"
      args:
        chdir: "{{ app_dir }}/backend"
      become: no
      ignore_errors: yes
