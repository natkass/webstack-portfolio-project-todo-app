name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install, build and test Backend
      working-directory: ./backend
      run: |
        npm install
        npm run build
        npm test

    - name: Install, build and test Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build
        npm test

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/backend:latest

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/frontend:latest
        
  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ~/project
          if [ ! -d "~/project/webstack-portfolio-project-todo-app/.git" ]; then
            rm -rf ~/project/webstack-portfolio-project-todo-app
            git clone https://github.com/${{ github.repository }}.git ~/project/webstack-portfolio-project-todo-app
          fi
          cd ~/project/webstack-portfolio-project-todo-app
          git pull origin main
          
          # Automatically sync .env from GitHub Secrets if DOTENV is provided
          if [ ! -z "${{ secrets.DOTENV }}" ]; then
            echo "${{ secrets.DOTENV }}" > .env
          fi
          
          export GITHUB_REPOSITORY=${{ github.repository }}
          docker compose pull
          docker compose up -d --remove-orphans

          # Safe cleanup: removes only dangling images and unused networks
          docker image prune -f
          docker network prune -f
