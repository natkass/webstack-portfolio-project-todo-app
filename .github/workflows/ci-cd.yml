name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install and build Backend
      working-directory: ./backend
      run: |
        npm install
        npm run build

    - name: Install and build Frontend
      working-directory: ./frontend
      run: |
        npm install
        npm run build

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false
        tags: backend:latest

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
        tags: frontend:latest
        
  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ~/project
          if [ ! -d "~/project/webstack-portfolio-project-todo-app/.git" ]; then
            rm -rf ~/project/webstack-portfolio-project-todo-app
            git clone https://github.com/${{ github.repository }}.git ~/project/webstack-portfolio-project-todo-app
          fi
          cd ~/project/webstack-portfolio-project-todo-app
          git pull origin main
          
          # Automatically sync .env from GitHub Secrets if DOTENV is provided
          if [ ! -z "${{ secrets.DOTENV }}" ]; then
            echo "${{ secrets.DOTENV }}" > .env
          fi
          
          docker compose up -d --build

        
